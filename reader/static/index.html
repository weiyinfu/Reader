<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>booklist</title>
    <script src="https://cdn.bootcss.com/jquery/3.2.1/jquery.min.js"></script>
    <script src="https://cdn.bootcss.com/vue/2.4.2/vue.min.js"></script>
    <script src="https://cdn.bootcss.com/urljs/2.3.1/url.min.js"></script>

</head>
<body>
<ul id="app">
    <li v-for="i in books">
        <a v-bind:href="bookUrl(i)">{{i.filename}}</a>
    </li>
</ul>
<script>
    var app = new Vue({
        el: '#app',
        data: {
            books: []
        },
        methods: {
            bookUrl: function (book) {
                if (book.isfolder) {
                    return "/static/index.html?file=" + book.filepath
                } else {
                    return "/static/read.html?book=" + book.filepath
                }
            }
        }
    })
    $.getJSON('/booklist', {
                file: Url.queryString('file')
            },
            function (resp) {
                app.books = resp
            }
    )
</script>
</body>
</html>
